time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - component.update: zehnder_filter_age
        - component.update: zehnder_filter_remaining

globals:
  - id: filter_reset_timestamp
    type: time_t
    restore_value: yes
    initial_value: '0'

  - id: filter_replacement_interval_days
    type: double
    restore_value: yes
    initial_value: '180'

  - id: last_zehnder_status
    type: std::string
    restore_value: no
    initial_value: '"Unknown"'

sensor:
  - platform: template
    name: "Filter age"
    id: zehnder_filter_age
    icon: mdi:clock-start
    unit_of_measurement: "d"
    state_class: measurement
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 300s

    lambda: |-
      const auto now = id(ha_time).now();
      const uint32_t reset_ts = id(filter_reset_timestamp);

      if (!now.is_valid() || reset_ts == 0) {
        return {};
      }

      const int32_t diff = static_cast<int32_t>(now.timestamp - reset_ts);
      if (diff <= 0) {
        return 0;
      }

      return diff / 86400;

  # time remaining until filter replacement is needed
  - platform: template
    name: "Filter Remaining"
    id: zehnder_filter_remaining
    icon: mdi:clock-start
    unit_of_measurement: "d"
    state_class: measurement
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 300s

    lambda: |-
      const auto now = id(ha_time).now();
      const uint32_t reset_ts = id(filter_reset_timestamp);

      if (!now.is_valid() || reset_ts == 0) {
        return {};
      }

      const int32_t age = static_cast<int32_t>(now.timestamp - reset_ts);
      const int32_t interval_sec = id(filter_replacement_interval_days) * 86400;

      const int32_t remaining_sec = interval_sec - age;

      if (remaining_sec > 0) {
        return (remaining_sec + 86399) / 86400; // ceil
      } else {
        return 0;
      }

# replacement status
binary_sensor:
  - platform: template
    name: "Filter status"
    id: zehnder_filter_status
    icon: mdi:air-filter
    device_class: problem
    entity_category: diagnostic

    lambda: |-
      const auto now = id(ha_time).now();
      const uint32_t reset_ts = id(filter_reset_timestamp);

      if (!now.is_valid() || reset_ts == 0) {
        return false;
      }

      const int32_t age = static_cast<int32_t>(now.timestamp - reset_ts);
      if (age <= 0) {
        return false;
      }

      const int32_t threshold_sec = id(filter_replacement_interval_days) * 86400;
      return age >= threshold_sec;

# reset timer button
button:
  - platform: template
    name: "Reset filter timer"
    id: zehnder_reset_filter_timer
    entity_category: config

    on_press:
      then:
        - lambda: |-
            auto now = id(ha_time).now();
            if (now.is_valid()) {
              id(filter_reset_timestamp) = now.timestamp;
            }
        - component.update: zehnder_filter_age
        - component.update: zehnder_filter_remaining

# configuration for the filter replacement interval (in days)
number:
  - platform: template
    name: "Filter replacement interval"
    id: zehnder_filter_replacement_interval
    icon: mdi:calendar-clock
    unit_of_measurement: "days"
    min_value: 30
    max_value: 365
    step: 1
    entity_category: config
    lambda: |-
      return id(filter_replacement_interval_days);
    set_action:
      then:
        - lambda: |-
            id(filter_replacement_interval_days) = x;
        - component.update: zehnder_filter_remaining

switch:
  - platform: template
    name: "Detect filter change"
    id: zehnder_detect_filter_change
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true

interval:
  - interval: 15s
    then:
      - lambda: |-
          auto current = id(zehnder_status).state;

          if (current != id(last_zehnder_status)) {

            // Detect transition to Standby
            if (current == "Standby") {
              id(zehnder_reset_filter_timer).press();
            }

            // Update stored state
            id(last_zehnder_status) = current;
          }