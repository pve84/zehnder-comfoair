# --- device info ---
- platform: modbus_controller
  internal: true
  modbus_controller_id: modbus_device
  entity_category: "diagnostic"
  name: "Firmware version (raw)"
  id: zehnder_firmware_version_raw
  address: 0x6E
  register_type: holding
  value_type: U_WORD # 20800 = 2.8.0 (Major.Minor.Patch with 2 digits)
  on_value: 
    then:
      - text_sensor.template.publish:
          id: zehnder_firmware_version
          state: !lambda |-
            int value = id(zehnder_firmware_version_raw).state;
            int major = value / 10000;      // Extract the major version
            int minor = (value / 100) % 100; // Extract the minor version
            int patch = value % 100;         // Extract the patch version
            return std::to_string(major) + "." + std::to_string(minor) + "." + std::to_string(patch);

text_sensor:
  - platform: template
    name: "Firmware version"
    id: zehnder_firmware_version
    icon: mdi:numeric
    update_interval: never
    entity_category: "diagnostic"
    
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Status"
    id: zehnder_status
    icon: mdi:clipboard-text
    entity_category: "diagnostic"
    address: 0x65
    register_type: holding
    raw_encode: HEXBYTES
    lambda: |-
        uint16_t value = modbus::helpers::word_from_hex_str(x, 0);
        switch (value) {
          case 0: return std::string("Error");
          case 1: return std::string("Initializing");
          case 2: return std::string("Self-Test");
          case 3: return std::string("Waiting for user input");
          case 10: return std::string("Normal");
          case 11: case 20: return std::string("Standby");
          case 40: case 41: case 42: return std::string("Maintenance Mode");
          default: return std::string("Unknown (") + std::to_string(value) + ")";
        }
        return x;
  
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Orientation"
    id: zehnder_orientation
    icon: mdi:arrow-left-right-bold
    register_type: holding
    entity_category: "diagnostic"
    address: 0x6F
    raw_encode: HEXBYTES
    lambda: |-
        uint16_t value = modbus::helpers::word_from_hex_str(x, 0);
        switch (value) {
          case 0: return std::string("Right");
          case 1: return std::string("Left");
          default: return std::string("Unknown (") + std::to_string(value) + ")";
        }
        return x;
        
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Model"
    id: zehnder_model
    icon: mdi:tag-text
    register_type: holding
    entity_category: "diagnostic"
    address: 0x70
    raw_encode: HEXBYTES
    lambda: |-
        uint16_t value = modbus::helpers::word_from_hex_str(x, 0);
        switch (value) {
          case 0: return std::string("E300 P");
          case 2: return std::string("E300 RF");
          case 3: return std::string("E400 RF");
          default: return std::string("Unknown (") + std::to_string(value) + ")";
        }
        return x;
  
binary_sensor:
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "RF input enabled"
  id: zehnder_rf_input_enabled
  icon: mdi:signal
  address: 0x13E
  register_type: holding
  disabled_by_default: true
  entity_category: "diagnostic"
  
- platform: template
  name: "Bypass"
  id: zehnder_bypass
  icon: mdi:valve
  device_class: opening

# --- pre-heater ---
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Pre-heater status"
  id: zehnder_pre_heater_status 
  icon: mdi:heating-coil
  address: 0x13F
  register_type: holding
  device_class: heat
  
- platform: modbus_controller
  modbus_controller_id: modbus_device
  internal: true
  address: 0x152
  register_type: holding
  id: zehnder_pre_heater_present_internal
  
- platform: template
  name: "Pre-heater present"
  icon: mdi:heating-coil
  entity_category: "diagnostic"
  id: zehnder_pre_heater_present
  lambda: |-
    if (id(zehnder_firmware_version_raw).state > 19999) { // only available on firmware 2.0.0+
      return id(zehnder_pre_heater_present_internal).state;
    } else {
      return {};
    }

# --- fireplace ---
- platform: modbus_controller
  modbus_controller_id: modbus_device
  internal: true
  address: 0x151
  register_type: holding
  id: zehnder_fireplace_mode_internal
  
- platform: template
  name: Fireplace mode
  icon: mdi:fireplace
  entity_category: "diagnostic"
  id: zehnder_fireplace_mode
  lambda: |-
    if (id(zehnder_firmware_version_raw).state > 19999) { // only available on firmware 2.0.0+
      return id(zehnder_fireplace_mode_internal).state;
    } else {
      return {};
    }
