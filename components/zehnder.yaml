esphome:
  min_version: 2026.4.0

uart:
  id: uart_modbus
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  baud_rate: 19200
  data_bits: 8
  parity: EVEN
  stop_bits: 1

modbus:
  uart_id: uart_modbus
  id: modbus1

modbus_controller:
- id: modbus_device
  address: 0x1
  modbus_id: modbus1
  setup_priority: -10
  update_interval: ${update_interval}
  on_offline:
    then:
      - text_sensor.template.publish:
          id: zehnder_status
          state: "Offline"

sensor:
# --- ventilation level ---
- platform: combination
  name: "Ventilation level"
  id: 'zehnder_ventilation_level'
  icon: mdi:fan
  type: max
  sources:
    - source: zehnder_analog_control_setpoint
    - source: zehnder_rf_control_setpoint
    - source: zehnder_three_way_control_setpoint
    - source: zehnder_bathroom_control_setpoint

# --- flow rate ---
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Exhaust flow rate"
  id: zehnder_exhaust_flow
  icon: mdi:home-export-outline
  register_type: holding
  address: 0x138
  unit_of_measurement: "m³/h"
  value_type: U_WORD
  device_class: "volume_flow_rate"
  state_class: "measurement"
  
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Supply flow rate"
  id: zehnder_supply_flow
  icon: mdi:home-import-outline
  register_type: holding
  address: 0x139
  unit_of_measurement: "m³/h"
  value_type: U_WORD
  device_class: "volume_flow_rate"
  state_class: "measurement"
  
# --- fan states --- 
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Exhaust fan duty cycle"
  id: zehnder_exhaust_duty
  icon: mdi:fan
  register_type: holding
  address: 0x136
  unit_of_measurement: "%"
  value_type: U_WORD
  accuracy_decimals: 1
  state_class: "measurement"
  filters:
    - multiply: 0.1
    
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Supply fan duty cycle"
  id: zehnder_supply_duty
  icon: mdi:fan
  register_type: holding
  address: 0x137
  unit_of_measurement: "%"
  value_type: U_WORD
  accuracy_decimals: 1
  state_class: "measurement"
  filters:
    - multiply: 0.1
    
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Exhaust fan speed"
  id: zehnder_exhaust_rpm
  icon: mdi:fan
  register_type: holding
  address: 0x13A
  unit_of_measurement: "RPM"
  value_type: U_WORD
  state_class: "measurement"
  
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Supply fan speed"
