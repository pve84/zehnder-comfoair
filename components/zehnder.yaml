# --- bypass ---
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Bypass motor active"
  id: zehnder_bypass_motor_active
  register_type: holding
  address: 0x145
  value_type: U_WORD
  state_class: "measurement"
  disabled_by_default: true
  
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Bypass setpoint"
  id: zehnder_bypass_setpoint
  icon: mdi:valve
  register_type: holding
  address: 0x146
  unit_of_measurement: "%"
  value_type: U_WORD
  state_class: "measurement"
  disabled_by_default: true
  
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Bypass Position"
  id: zehnder_bypass_position
  icon: mdi:valve
  register_type: holding
  address: 0x147
  unit_of_measurement: "%"
  value_type: U_WORD
  state_class: "measurement"
  disabled_by_default: true
  on_value:
    then:
      - lambda: |-
          if ((x > 0) && (x <= 100)) {
            id(zehnder_bypass).publish_state(true);
          } else if (x == 0) {
            id(zehnder_bypass).publish_state(false);
          } else {
            id(zehnder_bypass).publish_state({});
          }
  
