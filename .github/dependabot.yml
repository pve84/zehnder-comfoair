version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "CodedCactus"
    assignees:
      - "CodedCactus"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"