name: "ESPHome Setup"
description: "Sets up Python, installs dependencies, optionally creates CI secrets"

inputs:
  requirements-file:
    description: "Path to requirements.txt"
    required: false
    default: "requirements.txt"

  create-secrets:
    description: "Whether to generate dummy secrets"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: "${{ inputs.requirements-file }}"

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r "${{ inputs.requirements-file }}"

    - name: Create dummy secrets
      if: ${{ inputs.create-secrets == 'true' }}
      shell: bash
      run: |
        mkdir -p tests

        printf '%s\n' \
          'wifi_ssid: "ci_ssid"' \
          'wifi_password: "ci_password"' \
          'ota_password: "ci_ota_password"' \
          "api_key: $(openssl rand -base64 32)" \
          "device_api_key: $(openssl rand -base64 32)" \
          > tests/secrets.yaml