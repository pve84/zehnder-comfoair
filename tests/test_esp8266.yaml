substitutions:
  tx_pin: GPIO01
  rx_pin: GPIO03
  update_interval: 15s
  fan_output: fan_output
  fan_speed_count: "100"

esphome:
  name: zehnder-comfoair-test-esp8266
  friendly_name: Zehnder Comfoair Test ESP8266
  platformio_options:
    build_flags:
      - -Werror

esp8266:
  board: nodemcuv2
  framework:
    version: recommended

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: on
  min_auth_mode: wpa2

api:
  encryption:
    key: !secret device_api_key

ota:
  - platform: esphome
    password: !secret ota_password

packages:
 - !include ../components/zehnder.yaml
 - !include ../components/fan.yaml
 - !include ../components/extra-sensors.yaml
 - !include ../components/filter.yaml
 - !include ../components/register_dump.yaml
 
output:
- platform: esp8266_pwm
  pin: GPIO5
  frequency: 1kHz
  id: fan_output

logger:
  baud_rate: 0
  level: INFO
