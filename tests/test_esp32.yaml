substitutions:
  tx_pin: GPIO01
  rx_pin: GPIO03
  update_interval: 15s
  fan_output: fan_output
  
modbus:
   flow_control_pin: GPIO16

esphome:
  name: zehnder-comfoair-test-esp32
  friendly_name: Zehnder Comfoair Test ESP32
  platformio_options:
    build_flags:
      - -Werror

esp32:
  variant: esp32
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: on
  min_auth_mode: wpa2

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

packages:
  remote_package:
    url: https://github.com/CodedCactus/zehnder-comfoair
    ref: 'main'
    files: [components/zehnder.yaml,
            components/fan.yaml,
            components/filter.yaml,
            components/extra-sensors.yaml,
            components/register_dump.yaml]
    refresh: 0s

output:
  - platform: esp32_dac
    pin: GPIO25
    id: fan_output
